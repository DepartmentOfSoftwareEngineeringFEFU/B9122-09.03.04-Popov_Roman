x-prep-jwt: &prep-jwt
  JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?Copy .env.example to .env or set JWT_PRIVATE_KEY}
  JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?Copy .env.example to .env or set JWT_PUBLIC_KEY}

services:
  prep-db:
    image: postgres:16-alpine
    container_name: prep-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-prep}
      POSTGRES_USER: ${DB_USER:-prep}
      POSTGRES_PASSWORD: ${DB_PASS:-prep}
    ports:
      - "${DB_PORT:-55432}:5432"
    volumes:
      - prep-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-prep} -d ${DB_NAME:-prep}"]
      interval: 5s
      timeout: 5s
      retries: 12

  prep-minio:
    image: minio/minio:latest
    container_name: prep-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "${MINIO_PORT:-59000}:9000"
      - "${MINIO_CONSOLE_PORT:-59001}:9001"
    volumes:
      - prep-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12

  prep-assessment:
    build:
      context: .
      dockerfile: prep-assessment/Dockerfile
    container_name: prep-assessment
    restart: unless-stopped
    depends_on:
      prep-db:
        condition: service_healthy
      prep-minio:
        condition: service_healthy
    environment:
      APP_NAME: ${ASSESSMENT_APP_NAME:-prep-assessment-service}
      SERVER_PORT: ${ASSESSMENT_SERVER_PORT:-8080}
      DB_URL: jdbc:postgresql://prep-db:5432/${DB_NAME:-prep}?currentSchema=prep_assessment
      DB_USER: ${DB_USER:-prep}
      DB_PASS: ${DB_PASS:-prep}
      MINIO_URL: http://prep-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      MINIO_BUCKET: ${MINIO_BUCKET:-documents}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      LOGGING_LEVEL_DEFAULT: ${ASSESSMENT_LOG_LEVEL:-INFO}
      <<: *prep-jwt
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --output /dev/null http://localhost:8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      - "${ASSESSMENT_PORT:-8080}:8080"

  prep-auth:
    build:
      context: .
      dockerfile: prep-auth/Dockerfile
    container_name: prep-auth
    restart: unless-stopped
    depends_on:
      prep-db:
        condition: service_healthy
      prep-assessment:
        condition: service_healthy
    environment:
      APP_NAME: ${AUTH_APP_NAME:-prep-auth-service}
      SERVER_PORT: ${AUTH_SERVER_PORT:-8083}
      DB_URL: jdbc:postgresql://prep-db:5432/${DB_NAME:-prep}?currentSchema=prep_auth
      DB_USER: ${DB_USER:-prep}
      DB_PASS: ${DB_PASS:-prep}
      ASSESSMENT_URL: http://prep-assessment:8080
      BOOTSTRAP_ADMIN_ENABLED: ${BOOTSTRAP_ADMIN_ENABLED:-true}
      BOOTSTRAP_ADMIN_LOGIN: ${BOOTSTRAP_ADMIN_LOGIN:-demo-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-demo123}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-demo-admin@example.local}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      LOGGING_LEVEL_DEFAULT: ${AUTH_LOG_LEVEL:-INFO}
      <<: *prep-jwt
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --output /dev/null http://localhost:8083 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      - "${AUTH_PORT:-8083}:8083"

  prep-frontend:
    build:
      context: ./prep-front-two
      dockerfile: Dockerfile
      args:
        VITE_AUTH_BASE_URL: ${VITE_AUTH_BASE_URL:-http://localhost:8083}
        VITE_ASSESSMENT_BASE_URL: ${VITE_ASSESSMENT_BASE_URL:-http://localhost:8080}
    container_name: prep-frontend
    restart: unless-stopped
    depends_on:
      prep-auth:
        condition: service_healthy
      prep-assessment:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  prep-db-data:
  prep-minio-data:
