#
# Spring
#
spring.application.name=${APP_NAME:@project.artifactId@}
spring.application.version=${APP_VERSION:@project.version@}
server.port=${SERVER_PORT:8080}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
#
# Database
#
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/${DB_NAME:prep}?currentSchema=prep_assessment}
spring.datasource.username=${DB_USER:prep}
spring.datasource.password=${DB_PASS:prep}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.check_nullability=true
spring.jpa.properties.hibernate.hbm2ddl.auto=validate
#
# Liquibase
#
spring.liquibase.enabled=true
spring.liquibase.liquibase-schema=public
spring.liquibase.database-change-log-table=prep_assessment_log
spring.liquibase.database-change-log-lock-table=prep_assessment_lock
spring.liquibase.change-log=classpath:db/changelog.yaml
#
# Minio
#
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minio}
minio.secret-key=${MINIO_SECRET_KEY:minio123}
minio.bucket=${MINIO_BUCKET:documents}
#
# Logging
#
logging.level.root=${LOGGING_LEVEL_DEFAULT:INFO}
logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO
logging.level.org.postgresql=WARN
logging.level.org.apache.tomcat.util=WARN
logging.pattern.console=%d{ISO8601} %-5level [%t] %-30.30logger{29}: %msg%n%throwable
#
jwt.privateKey=${JWT_PRIVATE_KEY:#{null}}
jwt.publicKey=${JWT_PUBLIC_KEY:#{null}}
